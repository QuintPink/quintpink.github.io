baseURL: https://quintpink.github.io/
languageCode: "en-us"
title: Quillogs
theme: [PaperMod]


menu:
  main:
    - name: Archive
      url: archives
      weight: 5
    - name: Search
      url: search/
      weight: 10
    - name: Tags
      url: tags/
      weight: 10

taxonomies:
  tag: "tags"
  category: "categories"
  author: authors

params:
  defaultTheme: auto
  math: true
  ShowAllPagesInArchive: true
  homeInfoParams:
    Title: Hello, time for a coffee and some light reading?
    Content: Inspired by Lilian Weng's blog, I decided to share my own thoughts and progressions. I am currently in my first year PhD on the topic of analytically embedded neural networks for edge accelerators. I hope you take something useful away from this blog. Have fun - Quint

  author:
    name: Quinten Pinkhof
  socialIcons:
    - name: linkedin
      url: https://be.linkedin.com/in/quinten-pinkhof

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
          - - $
            - $
        enable: true
  highlight:
    noClasses: false